<!DOCTYPE html>

 <html>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const header = document.querySelector(".header");
  const menuTop = document.querySelector(".menu-top");
  const menuBottom = document.querySelector(".menu-bottom");

  function updateUI() {
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;

    const hide = scrollTop > 10;

    header?.classList.toggle("is-hidden", hide);
    menuTop?.classList.toggle("is-hidden", hide);
    menuBottom?.classList.toggle("is-hidden", hide);
  }

  window.addEventListener("scroll", updateUI);
  updateUI(); // état initial

});
</script>


<audio id="ambientSound" loop>
  <source src="audio/30 MINUTES Ocean Sounds for Deep Sleep _ Waves Crashing onto the Beach.mp3" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("ambientSound");

// volume constant
audio.volume = 0.04;
audio.playbackRate = 0.80;

// restaurer état
const wasPlaying = localStorage.getItem("audioPlaying");

if (wasPlaying === "true") {
  audio.play().catch(() => {});
}

// activation unique
document.addEventListener("click", () => {
  audio.play().then(() => {
    localStorage.setItem("audioPlaying", "true");
  });
}, { once: true });
</script>
